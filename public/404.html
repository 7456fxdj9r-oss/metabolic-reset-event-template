<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading…</title>
  <meta name="theme-color" content="#1a252f">
  <style>
    body {
      background: #1a252f; color: #95a5a6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      padding: 60px 20px; text-align: center;
      margin: 0;
    }
  </style>
</head>
<body>
  <p>Loading…</p>
  <script>
    // Clean-URL → query-string redirect for static GitHub Pages hosting.
    //
    // We want share links like /event/mike or /edit/mike/sMMF instead of
    // /event/?slug=mike or /edit/?slug=mike&key=sMMF. GitHub Pages 404s
    // the clean form (no file at that path), serves THIS page, and we
    // rewrite the URL into the query-string form the page actually reads.
    //
    // On Cloudflare Pages, public/_redirects handles this server-side as
    // a 200 rewrite — the clean URL stays in the address bar with no flash.
    // This file is only the GitHub Pages fallback path.
    //
    // Route table: page name → list of query-string param names, in the
    // same order as the path segments after the page. So `t` consumes the
    // next two segments and writes them as ?slug=…&t=… ; `event` consumes
    // one segment and writes ?slug=…
    (function () {
      var routes = {
        'event':     ['slug'],
        'science':   ['slug'],
        'speakers':  ['slug'],
        'stories':   ['slug'],
        'journey':   ['slug'],
        'raffle':    ['slug'],
        'hosts':     ['slug', 'key'],   // key optional (admin mode)
        'wheel':     ['slug', 'key'],   // key optional (host controller)
        'edit':          ['slug', 'key'],
        'live':          ['slug', 'key'],
        'raffle-poster': ['slug', 'key'],
        'cue':           ['slug', 'key'],
        'deck':          ['slug', 'key'],
        'deck-console':  ['slug', 'key'],
        't':         ['slug', 't'],
        'raffle/me': ['slug', 'token'],
      };

      var l = window.location;
      var parts = l.pathname.split('/').filter(Boolean);

      // Try each route — longest page name first so 'raffle/me' wins over 'raffle'.
      var pageNames = Object.keys(routes).sort(function (a, b) {
        return b.split('/').length - a.split('/').length;
      });

      for (var p = 0; p < pageNames.length; p++) {
        var page = pageNames[p];
        var pageSegs = page.split('/');
        // The page lives at parts[i..i+pageSegs.length-1] for some i, with
        // some number of args after it. Try every possible position.
        for (var i = 0; i <= parts.length - pageSegs.length; i++) {
          var match = true;
          for (var k = 0; k < pageSegs.length; k++) {
            if (parts[i + k] !== pageSegs[k]) { match = false; break; }
          }
          if (!match) continue;

          var args = parts.slice(i + pageSegs.length);
          if (args.length === 0) continue; // /edit alone → not a clean URL, skip
          if (args.length > routes[page].length) continue; // too many args

          // Build the redirect.
          var basePath = '/' + parts.slice(0, i).join('/');
          if (basePath !== '/' && basePath.charAt(basePath.length - 1) !== '/') basePath += '/';

          var existingQs = l.search ? l.search.substring(1) : '';
          var qsParts = existingQs ? [existingQs] : [];
          for (var j = 0; j < args.length; j++) {
            qsParts.push(routes[page][j] + '=' + encodeURIComponent(args[j]));
          }
          var newUrl = basePath + page + '/?' + qsParts.join('&') + l.hash;
          l.replace(newUrl);
          return;
        }
      }

      // Couldn't parse — go home.
      var fallback = '/' + parts.slice(0, -1).join('/');
      if (fallback === '/' || fallback === '') {
        l.replace('/');
      } else {
        if (fallback.charAt(fallback.length - 1) !== '/') fallback += '/';
        l.replace(fallback);
      }
    })();
  </script>
</body>
</html>
